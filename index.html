<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocaloid Sidebar</title>

<style>
/* ───── GLOBAL ───── */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #e2e8f0;
  text-align: center;

  background-image: url("gumi.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  cursor: none; /* hide default cursor */
}

/* dark overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 0;
}

/* ───── CUSTOM CURSOR ───── */
.cursor {
  width: 18px;
  height: 18px;
  border: 2px solid #22d3ee;
  border-radius: 50%;
  position: fixed;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.08s ease;
}

a:hover ~ .cursor,
button:hover ~ .cursor {
  transform: translate(-50%, -50%) scale(1.8);
}

/* ───── CONTENT ───── */
.container {
  position: relative;
  z-index: 1;
  padding: 10px;
}

h2 {
  color: #22d3ee;
  font-size: 14px;
  margin: 10px 0;
}

iframe {
  width: 100%;
  height: 140px;
  border: none;
  border-radius: 10px;
}

.title {
  font-size: 12px;
  margin-top: 5px;
  opacity: 0.9;
}

.box {
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="container">

  <!-- 🎤 SONG OF THE DAY -->
  <div class="box">
    <h2>🎤 Song of the Day</h2>
    <iframe id="sotd"></iframe>
    <div class="title" id="sotdTitle">Loading...</div>
  </div>

  <!-- 🆕 LATEST VOCALOID -->
  <div class="box">
    <h2>🆕 Latest Vocaloid</h2>
    <iframe id="latest"></iframe>
    <div class="title" id="latestTitle">Loading...</div>
  </div>

</div>

<script>
// ───── CUSTOM CURSOR MOVE ─────
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});


// ───── SONG OF THE DAY (MANUAL) ─────
const SOTD = {
  title: "Your Song Here",
  videoId: "VIDEO_ID"
};

document.getElementById("sotd").src =
  "https://www.youtube.com/embed/" + SOTD.videoId;

document.getElementById("sotdTitle").innerText = SOTD.title;


// ───── LATEST FROM VOCADB ─────
fetch("https://vocadb.net/api/songs?sort=PublishDate&maxResults=5")
  .then(res => res.json())
  .then(data => {

    const song = data.items.find(s =>
      s.pvs && s.pvs.some(p => p.service === "Youtube")
    );

    if (!song) return;

    const pv = song.pvs.find(p => p.service === "Youtube");

    document.getElementById("latestTitle").innerText = song.name;

    document.getElementById("latest").src =
      "https://www.youtube.com/embed/" + pv.url.split("v=")[1];
  });
</script>

</body>
</html>
