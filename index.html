<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocaloid Sidebar</title>

<style>
body {
  margin: 0;
  background-image: url("gumi.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  font-family: Arial, sans-serif;
}

/* dark overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
}

/* header */
header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 10px;
  color: #22d3ee;
  font-size: 14px;
  border-bottom: 1px solid #1e293b;
}

/* horizontal scroll container */
.scroll-box {
  position: relative;
  z-index: 1;

  width: 100%;
  height: 420px;

  overflow-x: auto;   /* horizontal scroll */
  overflow-y: hidden;

  white-space: nowrap;
  padding: 10px;
}

/* iframe is wider than container */
iframe {
  width: 900px;
  height: 400px;
  border: none;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<header>🎤 Vocaloid VocaDB Feed</header>

<div class="scroll-box">

  <iframe src="https://vocadb.net/"></iframe>

</div>

</body>
</html>
