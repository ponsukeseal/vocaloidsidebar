<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocaloid Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #e2e8f0;
  background: #0f172a;
}

header {
  padding: 10px;
  text-align: center;
  color: #22d3ee;
  font-weight: bold;
  font-size: 14px;
  border-bottom: 1px solid #1e293b;
}

.container {
  height: 420px;
  overflow-y: auto;
  padding: 10px;
}

/* song card */
.card {
  background: rgba(255,255,255,0.05);
  margin-bottom: 10px;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: rgba(34,211,238,0.15);
}

.title {
  font-size: 12px;
  margin-bottom: 5px;
}

.small {
  font-size: 10px;
  opacity: 0.7;
}

iframe {
  width: 100%;
  height: 120px;
  border: none;
  border-radius: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>🆕 Vocaloid Dashboard</header>

<div class="container" id="list">
  Loading...
</div>

<script>

// fetch latest songs
fetch("https://vocadb.net/api/songs?sort=PublishDate&maxResults=10")
  .then(r => r.json())
  .then(data => {

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.items.forEach(song => {

      const pv = song.pvs?.find(p => p.service === "Youtube");

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="title">${song.name}</div>
        <div class="small">Click to open VocaDB</div>
      `;

      // open VocaDB page
      card.onclick = () => {
        window.open("https://vocadb.net/S/" + song.id, "_blank");
      };

      // optional YouTube preview inside card
      if (pv) {
        let id = null;

        if (pv.url.includes("watch?v=")) {
          id = pv.url.split("watch?v=")[1].split("&")[0];
        } else if (pv.url.includes("youtu.be/")) {
          id = pv.url.split("youtu.be/")[1].split("?")[0];
        }

        if (id) {
          const iframe = document.createElement("iframe");
          iframe.src = "https://www.youtube.com/embed/" + id;
          card.appendChild(iframe);
        }
      }

      list.appendChild(card);
    });

  })
  .catch(() => {
    document.getElementById("list").innerText =
      "Failed to load VocaDB data";
  });

</script>

</body>
</html>
