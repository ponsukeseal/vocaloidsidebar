<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocaloid Sidebar</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #e2e8f0;
  text-align: center;

  background-image: url("gumi.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* dark overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
}

.container {
  position: relative;
  z-index: 1;
  padding: 10px;
}

h2 {
  color: #22d3ee;
  font-size: 14px;
  margin: 10px 0;
}

iframe {
  width: 100%;
  height: 80px; /* compact audio style */
  border: none;
  border-radius: 10px;
}

.title {
  font-size: 12px;
  margin-top: 6px;
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

  <h2>🆕 Latest Vocaloid Release</h2>

  <iframe id="player"></iframe>
  <div class="title" id="songTitle">Loading...</div>

</div>

<script>
fetch("https://vocadb.net/api/songs?sort=PublishDate&maxResults=10")
  .then(res => res.json())
  .then(data => {

    const song = data.items.find(s =>
      s.pvs && s.pvs.some(p => p.service === "Youtube")
    );

    if (!song) {
      document.getElementById("songTitle").innerText =
        "No YouTube preview found";
      return;
    }

    const pv = song.pvs.find(p => p.service === "Youtube");

    let videoId = null;

    // ───── FIX: handle multiple YouTube URL formats ─────
    if (pv.url.includes("watch?v=")) {
      videoId = pv.url.split("watch?v=")[1].split("&")[0];
    } 
    else if (pv.url.includes("youtu.be/")) {
      videoId = pv.url.split("youtu.be/")[1].split("?")[0];
    }

    if (!videoId) {
      document.getElementById("songTitle").innerText =
        "YouTube link format not supported";
      return;
    }

    document.getElementById("player").src =
      "https://www.youtube.com/embed/" + videoId + "?controls=1";

    document.getElementById("songTitle").innerText = song.name;
  })
  .catch(err => {
    document.getElementById("songTitle").innerText =
      "Failed to load VocaDB data";
    console.log(err);
  });
</script>


</body>
</html>
