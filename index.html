<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocaloid Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #e2e8f0;

  /* background image */
  background-image: url("gumi.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* dark overlay for readability */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
}

header {
  position: relative;
  z-index: 1;
  padding: 10px;
  text-align: center;
  color: #22d3ee;
  font-size: 14px;
  border-bottom: 1px solid #1e293b;
}

.container {
  position: relative;
  z-index: 1;
  height: 420px;
  overflow-y: auto;
  padding: 10px;
}

/* song card */
.card {
  background: rgba(255,255,255,0.06);
  margin-bottom: 10px;
  padding: 8px;
  border-radius: 10px;
  transition: 0.2s;
}

.card:hover {
  background: rgba(34,211,238,0.12);
}

.title {
  font-size: 12px;
  margin-bottom: 5px;
}

iframe {
  width: 100%;
  height: 90px;
  border: none;
  border-radius: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>🎤 Vocaloid Dashboard</header>

<div class="container" id="list">
  Loading...
</div>

<script>

// Fetch latest songs from VocaDB
fetch("https://vocadb.net/api/songs?sort=PublishDate&maxResults=10")
  .then(r => r.json())
  .then(data => {

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.items.forEach(song => {

      const pv = song.pvs?.find(p => p.service === "Youtube");

      const card = document.createElement("div");
      card.className = "card";

      const title = document.createElement("div");
      title.className = "title";
      title.innerText = song.name;

      card.appendChild(title);

      // YouTube embed
      if (pv) {
        let id = null;

        if (pv.url.includes("watch?v=")) {
          id = pv.url.split("watch?v=")[1].split("&")[0];
        } 
        else if (pv.url.includes("youtu.be/")) {
          id = pv.url.split("youtu.be/")[1].split("?")[0];
        }

        if (id) {
          const iframe = document.createElement("iframe");
          iframe.src = "https://www.youtube.com/embed/" + id + "?controls=1";
          card.appendChild(iframe);
        }
      }

      list.appendChild(card);
    });

  })
  .catch(() => {
    document.getElementById("list").innerText =
      "Failed to load data.";
  });

</script>

</body>
</html>
